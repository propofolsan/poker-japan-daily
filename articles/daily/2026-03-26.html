        :root {
            --primary: #1a1a2e;

            margin-bottom: 16px;

        .result-table {

            margin: 16px 0;
            font-size: 0.85rem;

            font-weight: 600;
            font-size: 0.75rem;

        }

            margin: 2010px 0;
            border-radius: 0 8px 8px 0;
        }

        .quote-box p {
            font-style: italic;
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }

        .stat-card {
            background: #f8f7f5;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-card .stat-number {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--accent);
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .divider {
